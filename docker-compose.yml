version: '2.0'

services:
  server:
    container_name: kag-dedicatedserver
    build:
      context: .
      dockerfile: Dockerfile
    image: kag-dedicatedserver:latest
    environment:
      - GAMEMODE=CTF
      - NAME=Default Server
      - DESCRIPTION=
      - MAX_PLAYERS=20
      - MAPCYCLE=
      - SV_PASSWORD=prettysecret
      - RCON_PASSWORD=supersecret
      # Super admin usernames (comma or semicolon separated)
      # - SUPERADMIN_USERS=Admin1,Admin2
      # Optional: set any autoconfig key via KAG_<key>, e.g.:
      # - KAG_sv_gravity=12
      # - KAG_sv_maxping=400
    volumes:
      # Security: copy repo Security/ and add admins to superadmin.cfg
      - ./Security:/opt/KAG/Security
      # Mods: create Mods/ and mods.cfg, then uncomment:
      - ./Mods:/opt/KAG/Mods
      - ./mods.cfg:/opt/KAG/mods.cfg
      # Custom autoconfig (optional): create file first, then uncomment:
      # - ./autoconfig.cfg:/opt/KAG/autoconfig.cfg
    restart: unless-stopped
    ports:
      - 50301:50301
      - 50301:50301/udp
